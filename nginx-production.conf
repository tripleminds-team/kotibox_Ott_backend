# Triple Minds Production Nginx Configuration
# Domain: flipshorts.app
# Save this as /etc/nginx/sites-available/triple-minds on your Ubuntu server
# Then enable with: sudo ln -sf /etc/nginx/sites-available/triple-minds /etc/nginx/sites-enabled/
# Test config: sudo nginx -t
# Reload nginx: sudo systemctl reload nginx

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name flipshorts.app www.flipshorts.app;
    return 301 https://$host$request_uri;
}

# HTTPS Server Configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name flipshorts.app www.flipshorts.app;

    # SSL Certificates - Let's Encrypt will auto-configure these
    ssl_certificate /etc/letsencrypt/live/flipshorts.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flipshorts.app/privkey.pem;

    # SSL Security Settings (strong)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Increase client_max_body_size to match your Fastify server limit (2GB)
    client_max_body_size 2G; # This is the key fix for 413 Request Entity Too Large!

    # Increase buffer sizes for large requests
    client_body_buffer_size 128k;

    # Timeouts to handle large file uploads
    client_header_timeout 300s;
    client_body_timeout 300s;
    send_timeout 300s;

    # Serve Admin Panel static files (Vite production build)
    location / {
        root /var/www/triple-minds/admin-panel/dist;
        try_files $uri $uri/ /index.html;
    }

    # Proxy to your Fastify backend (API endpoints)
    location /api {
        proxy_pass http://127.0.0.1:3000;

        # Proxy settings
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Proxy timeouts for large uploads
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Buffering for large files
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Maximum size of temporary files
        proxy_temp_file_write_size 64m;
    }

    # Serve static files directly from nginx
    location /uploads/ {
        alias /var/www/triple-minds/api-server/uploads/; # Update this path to match your actual uploads folder on the server
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# Also, make sure to update your main nginx config (/etc/nginx/nginx.conf) to have client_max_body_size:
# Add this line inside the http block:
# client_max_body_size 2G;
